<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recensement Entrepreneuriat Vert</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000000 !important;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .en-tete {
            background-color: #0d47a1;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .contact-bar {
            background-color: #111;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            flex-shrink: 0;
            border-bottom: 1px solid #333;
        }

        .contact-label {
            color: #4caf50;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            border-right: 2px solid #333;
            padding-right: 15px;
        }

        .contact-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .contact-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
        }

        .contact-links i {
            margin-right: 6px;
            font-size: 1.1rem;
        }

        /* Couleurs des icônes */
        .fa-facebook { color: #1877F2; }
        .fa-whatsapp { color: #25D366; }
        .fa-envelope { color: #ea4335; }

        @media (max-width: 600px) {
            .contact-label {
                border-right: none;
                padding-right: 0;
                width: 100%;
                text-align: center;
                margin-bottom: -5px;
            }
        }

        .container {
            flex-grow: 1;
            width: 100%;
            position: relative;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
    </style>
</head>
<body>

    <div class="en-tete">
        Identification des acteurs de l'entrepreneuriat vert
    </div>

    <div class="contact-bar">
        <div class="contact-label">
            Contacts DREDD VAKINANKARATRA
        </div>
        
        <div class="contact-links">
            <a href="https://www.facebook.com/100038120421953" target="_blank">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            
            <a href="whatsapp://send?phone=261344740615">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            
            <a href="mailto:dreddvakinankaratra@environnement.mg">
                <i class="fas fa-envelope"></i> E-mail
            </a>
        </div>
    </div>

    <div class="container">
        <iframe src="https://tally.so/embed/vGOobd?hideTitle=1&transparentBackground=1" 
                title="Formulaire"></iframe>
    </div>

</body>
</html>
