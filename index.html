<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background-color: #000000;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
    }

    .en-tete {
        background-color: #0d47a1;
        color: white;
        padding: 12px;
        text-align: center;
        font-size: 1rem;
        font-weight: bold;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .sous-titre {
        font-size: 0.8rem;
        margin-top: 5px;
        font-weight: normal;
        opacity: 0.9;
    }

    .contact-bar {
        background-color: #111;
        padding: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
        flex-shrink: 0;
        border-bottom: 1px solid #333;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .contact-label {
        color: #4caf50;
        font-weight: bold;
        font-size: 0.85rem;
        text-transform: uppercase;
    }

    .contact-links {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .contact-links a {
        color: #ffffff;
        text-decoration: none;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        transition: 0.3s;
    }

    .contact-links a:hover {
        opacity: 0.7;
    }

    .contact-links i {
        margin-right: 6px;
        font-size: 1rem;
    }

    .fa-facebook { color: #1877F2; }
    .fa-whatsapp { color: #25D366; }
    .fa-envelope { color: #ea4335; }

    .container {
        flex-grow: 1;
        width: 100%;
        position: relative;
    }

    iframe {
        border: none;
        width: 100%;
        height: 100%;
        background-color: transparent;
        opacity: 0;
        animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
        }
    }

    @media (max-width: 600px) {
        .en-tete {
            font-size: 0.9rem;
            padding: 10px;
        }

        .contact-label {
            width: 100%;
            text-align: center;
        }
    }
</style>
