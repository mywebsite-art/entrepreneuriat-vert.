<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREDD Vakinankaratra - Entrepreneuriat Vert</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #f4f4f4; color: #333; overflow-x: hidden; }

        /* Garde la couverture avec les éoliennes */
        .hero { 
            position: relative; height: 45vh; width: 100%; 
            overflow: hidden; display: flex; align-items: center; 
            justify-content: center; text-align: center; background: #000;
        }
        video#bg-video { 
            position: absolute; top: 50%; left: 50%; 
            min-width: 100%; min-height: 100%; 
            z-index: 0; transform: translate(-50%, -50%); 
            filter: brightness(0.5); object-fit: cover;
        }
        .hero-content { z-index: 2; padding: 20px; color: white; }
        .logo { width: 90px; margin-bottom: 10px; }

        .container { 
            max-width: 500px; margin: -40px auto 50px; 
            position: relative; z-index: 10; padding: 15px;
        }

        .white-card {
            background: white; border-radius: 15px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px;
        }

        .social-links { text-align: center; padding: 15px 0; border-top: 1px solid #eee; margin-top: 20px; }
        .social-links a { text-decoration: none; margin: 0 15px; font-size: 28px; }

        h2 { font-size: 1.2rem; color: #7c0e73; border-left: 4px solid #7c0e73; padding-left: 10px; margin-bottom: 15px; }
        
        /* Style pour la vidéo du bas */
        .video-bas { width: 100%; border-radius: 10px; background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="hero">
        <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
            <source src="background.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <img src="logo.png" alt="Logo DREDD" class="logo">
            <h1 style="margin:0; font-size: 1.5rem;">Identification des acteurs</h1>
            <p style="color: #4ade80; font-weight: bold; margin: 5px 0 0;">DREDD VAKINANKARATRA</p>
        </div>
    </div>

    <div class="container">
        <div class="white-card">
            <h2>Formulaire d'enregistrement</h2>
            <iframe src="https://tally.so/embed/ton_code_ici?hideTitle=1&transparentBackground=1&dynamicHeight=1" 
                    width="100%" height="500" frameborder="0" marginheight="0" marginwidth="0"></iframe>
        </div>

        <div class="white-card">
            <div class="social-links">
                <a href="https://facebook.com/votre_page" title="Facebook">🔵</a>
                <a href="https://wa.me/261340000000" title="WhatsApp">🟢</a>
                <a href="mailto:votre-email@exemple.com" title="Email">📩</a>
            </div>
        </div>

        <div class="white-card">
            <h2>Aperçu de nos missions</h2>
            <video controls class="video-bas">
                <source src="mission.mp4" type="video/mp4">
                Votre navigateur ne supporte pas la lecture de cette vidéo.
            </video>
        </div>
    </div>

    <script async src="https://tally.so/widgets/embed.js"></script>
</body>
</html>
