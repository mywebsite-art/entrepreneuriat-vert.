<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrepreneuriat Vert</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body {
            background: #020617;
            color: #e5e7eb;
            overflow: hidden; 
        }

        /* --- SECTION INTRO --- */
        #intro-section {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* PLACE LE BOUTON EN BAS */
            justify-content: flex-end; 
            z-index: 100;
            background: #000;
            transition: opacity 0.8s ease-out;
            padding-bottom: 50px; /* Distance du bouton par rapport au bas */
        }

        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* CONTAIN : Affiche toute la vidéo sans couper les bords */
            object-fit: contain; 
            opacity: 0.9;
        }

        .intro-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
        }

        .start-btn {
            padding: 18px 35px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background: #22c55e;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-lang-separator {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.4);
        }

        .start-btn:active { transform: scale(0.95); }

        /* --- SECTION FORMULAIRE --- */
        #form-section {
            display: none; 
            opacity: 0;
            min-height: 100vh;
            flex-direction: column;
            background: linear-gradient(135deg, #0f172a, #020617);
            transition: opacity 1s ease-in;
        }

        .title { text-align: center; font-size: 1.05rem; font-weight: bold; padding: 15px; background: linear-gradient(90deg, #22c55e, #4ade80, #86efac); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .contact-bar { 
            display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 8px; padding: 10px; 
            background: rgba(17,24,39,0.85); backdrop-filter: blur(10px); 
            scrollbar-width: none;
        }
        .contact-bar::-webkit-scrollbar { display: none; }

        .contact-card { 
            flex: 0 0 auto; min-width: 95px; height: 34px; padding: 0 12px; 
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px; display: flex; align-items: center; justify-content: center; 
            gap: 5px; text-decoration: none; color: #e5e7eb; font-size: 0.7rem; 
        }

        .container { flex: 1; padding: 10px; display: flex; margin-bottom: 10px; }
        .card { flex: 1; min-height: 70vh; border-radius: 18px; overflow: hidden; background: rgba(17,24,39,0.6); border: 1px solid rgba(255,255,255,0.05); }
        iframe { width: 100%; height: 100%; border: none; }

        .fa-facebook { color: #1877F2; } .fa-whatsapp { color: #25D366; } .fa-envelope { color: #ef4444; } .fa-phone { color: #22c55e; }
    </style>
</head>
<body>

    <div id="intro-section">
        <video id="bg-video" autoplay loop muted playsinline>
            <source src="https://github.com/mywebsite-art/entrepreneuriat-vert./raw/refs/heads/main/background.mp4" type="video/mp4">
        </video>
        
        <div class="intro-content">
            <button class="start-btn" onclick="startApp()">
                <span>COMMENCER</span>
                <div class="btn-lang-separator"></div>
                <span>HANOMBOKA</span>
                <i class="fas fa-chevron-right" style="margin-left: 5px; font-size: 0.8rem;"></i>
            </button>
        </div>
    </div>

    <div id="form-section">
        <div class="title">🌱 Identification des acteurs de l'entrepreneuriat vert</div>
        
        <div class="contact-bar">
            <a class="contact-card" href="https://www.facebook.com/100038120421953" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a class="contact-card" href="https://wa.me/261340365611" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a class="contact-card" href="mailto:dreddvakinankaratra@environnement.mg"><i class="fas fa-envelope"></i> Email</a>
            <a class="contact-card" href="tel:+261340365611"><i class="fas fa-phone"></i> Appeler</a>
        </div>

        <div class="container">
            <div class="card">
                <iframe src="https://tally.so/embed/vGOobd?hideTitle=1&transparentBackground=1" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <script>
        function startApp() {
            const intro = document.getElementById('intro-section');
            const form = document.getElementById('form-section');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                form.style.display = 'flex';
                setTimeout(() => {
                    form.style.opacity = '1';
                    document.body.style.overflow = 'auto';
                }, 50);
            }, 800);
        }
    </script>

</body>
</html>
