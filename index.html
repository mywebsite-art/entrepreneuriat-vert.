<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneuriat Vert</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --primary: #1e3a8a;
    --dark: #0f172a;
    --card: #111827;
    --text: #e5e7eb;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    color: var(--text);
    background: linear-gradient(135deg, #0f172a, #020617);
    position: relative;
    overflow-x: hidden;
}

/* ✔ FIX TEXTURE (IMPORTANT) */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
    opacity: 0.15;
    z-index: 0;
    pointer-events: none;
}

/* CONTENU AU-DESSUS DU FOND */
.header,
.contact-bar,
.container {
    position: relative;
    z-index: 1;
}

/* ANIMATION */
.anim {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeSlide 0.9s ease-out forwards;
}

@keyframes fadeSlide {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* HEADER */
.header {
    background: linear-gradient(90deg, var(--primary), #2563eb);
    padding: 14px;
    text-align: center;
    font-size: 1.1rem;
    font-weight: bold;
}

/* CONTACT BAR */
.contact-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px;
    background: rgba(17,24,39,0.85);
    backdrop-filter: blur(10px);
}

/* CARD CONTACT */
.contact-card {
    background: var(--card);
    padding: 6px 10px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--text);
    font-size: 0.85rem;
    transition: 0.2s;
    border: 1px solid rgba(255,255,255,0.05);
}

.contact-card:hover {
    transform: translateY(-2px);
    background: #1f2937;
}

/* ICÔNES */
.fa-facebook { color: #1877F2; }
.fa-whatsapp { color: #25D366; }
.fa-envelope { color: #ef4444; }
.fa-phone { color: #22c55e; }

/* NUMÉRO SOUS FACEBOOK */
.contact-extra {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    color: #cbd5e1;
    margin-top: 4px;
}

/* FORM */
.container {
    flex: 1;
    padding: 10px;
    display: flex;
}

.card {
    flex: 1;
    min-height: 75vh;
    border-radius: 18px;
    overflow: hidden;
    background: rgba(17,24,39,0.6);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
}

/* IFRAME */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* MOBILE */
@media (max-width: 600px) {
    .header {
        font-size: 1rem;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header anim">
    🌱 Identification des acteurs de l'entrepreneuriat vert
</div>

<!-- CONTACT -->
<div class="contact-bar anim" style="animation-delay: 0.2s;">

    <a class="contact-card" href="https://www.facebook.com/100038120421953" target="_blank">
        <i class="fab fa-facebook"></i> Facebook

        <!-- NUMÉRO SOUS FACEBOOK -->
        <div class="contact-extra">
            <i class="fas fa-phone"></i>
            +261 34 03 656 11
        </div>
    </a>

    <a class="contact-card" href="https://wa.me/261340365611" target="_blank">
        <i class="fab fa-whatsapp"></i> WhatsApp
    </a>

    <a class="contact-card" href="mailto:dreddvakinankaratra@environnement.mg">
        <i class="fas fa-envelope"></i> Email
    </a>

</div>

<!-- FORM -->
<div class="container anim" style="animation-delay: 0.4s;">
    <div class="card">
        <iframe 
            src="https://tally.so/embed/vGOobd?hideTitle=1&transparentBackground=1"
            loading="lazy">
        </iframe>
    </div>
</div>

</body>
</html>
