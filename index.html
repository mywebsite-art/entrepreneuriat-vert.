<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recensement Entrepreneuriat Vert</title>
    <style>
        /* Configuration du fond de la page GitHub */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000000 !important; /* Fond NOIR pour la lisibilité */
            font-family: Arial, sans-serif;
            overflow: hidden; /* Évite les doubles barres de défilement */
        }

        /* Barre d'en-tête bleue officielle */
        .en-tete {
            background-color: #0d47a1;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.5);
        }

        /* Conteneur du formulaire Tally */
        iframe {
            border: none;
            width: 100%;
            height: calc(100vh - 55px); /* S'adapte à l'écran moins l'en-tête */
            background-color: transparent;
        }
    </style>
</head>
<body>

    <div class="en-tete">
        Identification des acteurs de l'entrepreneuriat vert
    </div>

    <iframe src="https://tally.so/embed/vGOobd?hideTitle=1&transparentBackground=1" 
            title="Formulaire"></iframe>

</body>
</html>
