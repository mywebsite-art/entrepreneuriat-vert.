<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Recensement Entrepreneuriat Vert</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
    background: black;
}

/* 🎬 VIDEO BACKGROUND */
.video-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* 🌑 OVERLAY */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    z-index: -1;
}

/* HEADER PROPRE */
.en-tete {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;

    background: rgba(13, 71, 161, 0.9);
    color: white;
    padding: 15px;
}

.logo {
    width: 80px;
    margin-bottom: 8px;
}

/* TEXTE SOUS LOGO */
.titre {
    font-weight: bold;
    font-size: 1rem;
}

.sous-titre {
    font-size: 0.8rem;
    margin-top: 5px;
    opacity: 0.9;
}

/* CONTACT BAR */
.contact-bar {
    background: rgba(0,0,0,0.85);
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.contact-label {
    color: #4caf50;
    font-weight: bold;
}

.contact-links a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
    font-size: 0.85rem;
}

.contact-links i {
    margin-right: 5px;
}

/* FORM */
.container {
    height: calc(100% - 160px);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>

</head>

<body>

<!-- 🎬 VIDEO -->

<video autoplay muted loop playsinline class="video-bg">
    <source src="background.mp4" type="video/mp4">
</video>
