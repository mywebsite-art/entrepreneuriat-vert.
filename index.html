<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneuriat Vert</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* INTRO VIDEO FULL SCREEN */
.intro {
    position: fixed;
    inset: 0;
    overflow: hidden;
}

/* VIDEO BACKGROUND */
.intro video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
}

/* DARK OVERLAY */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

/* START BUTTON */
.start-btn {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);

    background: #22c55e;
    color: #0f172a;

    border: none;
    padding: 12px 18px;
    border-radius: 12px;

    font-weight: bold;
    cursor: pointer;

    z-index: 2;
}

.start-btn:hover {
    background: #16a34a;
}

/* FORM PAGE */
.container {
    display: none;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f172a, #020617);
}

.card {
    margin: 10px;
    min-height: 90vh;
    border-radius: 18px;
    overflow: hidden;
    background: rgba(17,24,39,0.6);
    border: 1px solid rgba(255,255,255,0.05);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

<body>

<!-- 🔥 INTRO VIDEO -->
<div class="intro" id="intro">

    <video autoplay muted loop playsinline>
        <source src="https://TON_USER.github.io/TON_REPO/backgrounde.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <button class="start-btn" onclick="startForm()">
        Commencer le formulaire
    </button>

</div>

<!-- FORM -->
<div class="container" id="form">

    <div class="card">
        <iframe 
            src="https://tally.so/embed/vGOobd?hideTitle=1&transparentBackground=1"
            loading="lazy">
        </iframe>
    </div>

</div>

<!-- SCRIPT -->
<script>
function startForm() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("form").style.display = "block";
}
</script>

</body>
</html>
